# Codex runs inside a hardened Docker container — the container IS the sandbox.
# The CLI flag --dangerously-bypass-approvals-and-sandbox disables the OS-level
# sandbox (Seatbelt/bubblewrap) since Docker provides isolation via:
#   --cap-drop ALL, --security-opt no-new-privileges, optional --network=none

# Default model — can be overridden via `agentd shell --codex --model <name>`
check_for_update_on_startup = false
commit_attribution = ""
model = "gpt-5.4"
model_reasoning_effort = "high"
model_verbosity = "low"
personality = "pragmatic"

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"

[projects."/workspace"]
trust_level = "trusted"
disable_commands = [
  "gh pr create*",
  "gh pr close*",
  "gh pr merge*",
  "gh pr edit*",
  "gh pr comment*",
  "gh pr review*",
  "gh pr ready*",
  "gh pr reopen*",
  "gh issue create*",
  "gh issue close*",
  "gh issue edit*",
  "gh issue comment*",
  "gh issue delete*",
  "gh issue reopen*",
  "gh repo create*",
  "gh repo delete*",
  "gh repo fork*",
  "gh repo rename*",
  "gh repo archive*",
  "gh release create*",
  "gh release delete*",
  "gh release edit*",
  "gh label create*",
  "gh label delete*",
  "gh label edit*",
  "gh api -X POST*",
  "gh api -X PUT*",
  "gh api -X PATCH*",
  "gh api -X DELETE*",
  "gh api --method POST*",
  "gh api --method PUT*",
  "gh api --method PATCH*",
  "gh api --method DELETE*",
]

[shell_environment_policy]
inherit = "core"

[tui]
notification_method = "bel"
show_tooltips = false
status_line = ["model-with-reasoning", "context-remaining", "current-dir", "git-branch", "context-used", "five-hour-limit"]
